<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblocked Games Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <!-- Tailwind CSS CDN (Stable v3) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      // Configure Tailwind
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                500: '#10b981',
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: #0A0A0A;
        color: #f4f4f5;
      }
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body class="selection:bg-emerald-500/30">
    <div id="app">
      <!-- Initial Loading State -->
      <div id="loading-screen" class="min-h-screen flex items-center justify-center">
        <div class="flex flex-col items-center gap-4">
          <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
          <p class="text-zinc-500 font-medium animate-pulse">Loading Hub...</p>
          <noscript>
            <p class="text-red-500">JavaScript is required to run this app.</p>
          </noscript>
        </div>
      </div>
    </div>

    <script>
      // Embedded Data to ensure zero pathing issues
      const data = {
        "games": [
          {
            "id": "slope",
            "title": "Slope",
            "description": "A fast-paced 3D running game.",
            "url": "https://kdata1.com/2020/05/slope/",
            "category": "Action",
            "thumbnail": "https://picsum.photos/seed/slope/400/300"
          }
        ]
      };

      // Application State
      const state = {
        activeTab: 'games',
        searchQuery: '',
        selectedItem: null,
        isFullscreen: false
      };

      // Core Render Function
      function render() {
        console.log("Rendering app...");
        const app = document.getElementById('app');
        if (!app) {
          console.error("Root element #app not found!");
          return;
        }
        
        const filteredItems = data.games.filter(item => 
          item.title.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
          item.category.toLowerCase().includes(state.searchQuery.toLowerCase())
        );

        app.innerHTML = `
          <div class="min-h-screen flex flex-col">
            <!-- Navigation -->
            <nav class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-xl sticky top-0 z-40">
              <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                  <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="gamepad-2" class="w-5 h-5 text-black"></i>
                  </div>
                  <span class="font-bold text-xl tracking-tight hidden sm:block">HUB</span>
                </div>

                <div class="flex-1 max-w-md relative">
                  <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                  <input
                    type="text"
                    id="search-input"
                    placeholder="Search games..."
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all text-white"
                    value="${state.searchQuery}"
                  />
                </div>

                <div class="flex items-center gap-1 bg-zinc-800 p-1 rounded-full">
                  <button
                    onclick="switchTab('games')"
                    class="px-4 py-1.5 rounded-full text-sm font-medium transition-all flex items-center gap-2 bg-emerald-500 text-black"
                  >
                    <i data-lucide="gamepad-2" class="w-4 h-4"></i>
                    Games
                  </button>
                </div>
              </div>
            </nav>

            <!-- Main Content -->
            <main class="max-w-7xl mx-auto px-4 py-8 flex-1 w-full">
              <header class="mb-8">
                <h1 class="text-3xl font-bold mb-2 capitalize">
                  Featured Games
                </h1>
                <p class="text-zinc-500">
                  Hand-picked unblocked games for your entertainment.
                </p>
              </header>

              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                ${filteredItems.map(item => `
                  <div
                    onclick="selectItem('${item.id}')"
                    class="item-card group bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden cursor-pointer hover:border-emerald-500/50 transition-all"
                  >
                    <div class="aspect-video relative overflow-hidden">
                      <img
                        src="${item.thumbnail}"
                        alt="${item.title}"
                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                        referrerpolicy="no-referrer"
                      />
                      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                        <span class="bg-emerald-500 text-black px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                          PLAY NOW <i data-lucide="external-link" class="w-3 h-3"></i>
                        </span>
                      </div>
                    </div>
                    <div class="p-4">
                      <div class="flex items-start justify-between mb-1">
                        <h3 class="font-bold text-lg group-hover:text-emerald-400 transition-colors">
                          ${item.title}
                        </h3>
                        <span class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold border border-zinc-800 px-2 py-0.5 rounded">
                          ${item.category}
                        </span>
                      </div>
                      <p class="text-zinc-500 text-sm line-clamp-2">
                        ${item.description}
                      </p>
                    </div>
                  </div>
                `).join('')}
              </div>

              ${filteredItems.length === 0 ? `
                <div class="text-center py-20">
                  <div class="w-16 h-16 bg-zinc-900 rounded-full flex items-center justify-center mx-auto mb-4 border border-zinc-800">
                    <i data-lucide="search" class="w-8 h-8 text-zinc-700"></i>
                  </div>
                  <h3 class="text-xl font-bold mb-2">No results found</h3>
                  <p class="text-zinc-500">Try searching for something else.</p>
                </div>
              ` : ''}
            </main>

            <!-- Footer -->
            <footer class="border-t border-zinc-900 py-12 mt-20">
              <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center gap-2">
                  <div class="w-6 h-6 bg-zinc-800 rounded flex items-center justify-center">
                    <i data-lucide="gamepad-2" class="w-4 h-4 text-zinc-400"></i>
                  </div>
                  <span class="font-bold text-zinc-400">Unblocked Hub</span>
                </div>
                <p class="text-zinc-600 text-sm">
                  © ${new Date().getFullYear()} Unblocked Games Hub. All rights reserved.
                </p>
                <div class="flex gap-6 text-sm text-zinc-500">
                  <a href="#" class="hover:text-emerald-500 transition-colors">Terms</a>
                  <a href="#" class="hover:text-emerald-500 transition-colors">Privacy</a>
                  <a href="#" class="hover:text-emerald-500 transition-colors">Contact</a>
                </div>
              </div>
            </footer>

            <!-- Modal -->
            <div id="modal" class="fixed inset-0 z-50 flex flex-col bg-black ${state.selectedItem ? 'flex' : 'hidden'}">
              ${state.selectedItem ? `
                <div class="h-14 bg-zinc-900 border-b border-zinc-800 flex items-center justify-between px-4">
                  <div class="flex items-center gap-4">
                    <button onclick="closeModal()" class="p-2 hover:bg-zinc-800 rounded-lg transition-colors text-zinc-400 hover:text-white">
                      <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <div>
                      <h2 class="font-bold text-sm leading-none mb-1">${state.selectedItem.title}</h2>
                      <p class="text-[10px] text-zinc-500 uppercase tracking-wider font-bold">${state.selectedItem.category}</p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <button onclick="window.open(state.selectedItem.url, '_blank')" class="p-2 hover:bg-zinc-800 rounded-lg transition-colors text-zinc-400 hover:text-white" title="Open in New Tab">
                      <i data-lucide="external-link" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleFullscreen()" class="p-2 hover:bg-zinc-800 rounded-lg transition-colors text-zinc-400 hover:text-white">
                      <i data-lucide="maximize-2" class="w-5 h-5"></i>
                    </button>
                    <button onclick="closeModal()" class="p-2 hover:bg-red-500/20 hover:text-red-500 rounded-lg transition-colors text-zinc-400">
                      <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                  </div>
                </div>
                <div class="flex-1 relative bg-zinc-950 ${state.isFullscreen ? 'p-0' : 'p-4 sm:p-8'}">
                  <div class="w-full h-full mx-auto bg-black rounded-xl overflow-hidden shadow-2xl border border-zinc-800 transition-all duration-300 ${state.isFullscreen ? 'max-w-none rounded-none border-none' : 'max-w-5xl'}">
                    <iframe
                      src="${state.selectedItem.url}"
                      class="w-full h-full border-none"
                      title="${state.selectedItem.title}"
                      allow="accelerometer *; ambient-light-sensor *; autoplay *; camera *; clipboard-read *; clipboard-write *; encrypted-media *; fullscreen *; geolocation *; gyroscope *; local-network-access *; magnetometer *; microphone *; midi *; payment *; picture-in-picture *; screen-wake-lock *; speaker *; sync-xhr *; usb *; vibrate *; vr *; web-share *"
                      sandbox="allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation-by-user-activation allow-storage-access-by-user-activation"
                      allowfullscreen
                    ></iframe>
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        `;

        // Re-initialize Lucide icons
        if (window.lucide) {
          lucide.createIcons();
        }

        // Search Input Handling
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
          searchInput.oninput = (e) => { 
            state.searchQuery = e.target.value; 
            updateGrid();
          };
          // Maintain focus if we were typing
          if (state.searchQuery) {
            searchInput.focus();
            searchInput.setSelectionRange(state.searchQuery.length, state.searchQuery.length);
          }
        }
      }

      // Helper Functions
      function switchTab(tab) {
        state.activeTab = tab;
        render();
      }

      function selectItem(id) {
        const items = data.games;
        state.selectedItem = items.find(i => i.id === id);
        state.isFullscreen = false;
        render();
      }

      function closeModal() {
        state.selectedItem = null;
        state.isFullscreen = false;
        render();
      }

      function toggleFullscreen() {
        state.isFullscreen = !state.isFullscreen;
        render();
      }

      function updateGrid() {
        const filteredItems = data.games.filter(item => 
          item.title.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
          item.category.toLowerCase().includes(state.searchQuery.toLowerCase())
        );
        
        const grid = document.querySelector('.grid');
        if (grid) {
          grid.innerHTML = filteredItems.map(item => `
            <div
              onclick="selectItem('${item.id}')"
              class="item-card group bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden cursor-pointer hover:border-emerald-500/50 transition-all"
            >
              <div class="aspect-video relative overflow-hidden">
                <img
                  src="${item.thumbnail}"
                  alt="${item.title}"
                  class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                  referrerpolicy="no-referrer"
                />
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                  <span class="bg-emerald-500 text-black px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                    PLAY NOW <i data-lucide="external-link" class="w-3 h-3"></i>
                  </span>
                </div>
              </div>
              <div class="p-4">
                <div class="flex items-start justify-between mb-1">
                  <h3 class="font-bold text-lg group-hover:text-emerald-400 transition-colors">
                    ${item.title}
                  </h3>
                  <span class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold border border-zinc-800 px-2 py-0.5 rounded">
                    ${item.category}
                  </span>
                </div>
                <p class="text-zinc-500 text-sm line-clamp-2">
                  ${item.description}
                </p>
              </div>
            </div>
          `).join('');
          
          if (window.lucide) lucide.createIcons();
        }
      }

      // Start the app
      try {
        console.log("Initializing app...");
        render();
      } catch (e) {
        console.error("App initialization failed:", e);
        document.body.innerHTML = `<div style="color: white; padding: 20px;">Error: ${e.message}</div>`;
      }
    </script>
  </body>
</html>
