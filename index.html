        if (window.lucide) {

        // Search Input Handling
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
          searchInput.oninput = (e) => { 
            state.searchQuery = e.target.value; 
            updateGrid();
          };
          // Maintain focus if we were typing
          if (state.searchQuery) {
            searchInput.focus();
            searchInput.setSelectionRange(state.searchQuery.length, state.searchQuery.length);
          }
        }
      }

      // Helper Functions
      function reloadGame() {
        const iframe = document.getElementById('game-iframe');
        const loader = document.getElementById('game-loader');
        if (iframe) {
          if (loader) loader.classList.remove('hidden');
          const src = iframe.src;
          iframe.src = 'about:blank';
          setTimeout(() => {
            iframe.src = src;
          }, 50);
        }
      }

      function switchTab(tab) {
        state.activeTab = tab;
        render();
      }

      function selectItem(id) {
        const items = data.games;
        state.selectedItem = items.find(i => i.id === id);
        state.isFullscreen = false;
        render();
      }

      function closeModal() {
        state.selectedItem = null;
        state.isFullscreen = false;
        render();
      }

      function toggleFullscreen() {
        state.isFullscreen = !state.isFullscreen;
        render();
      }

      function setCategory(category) {
        state.selectedCategory = category;
        render();
      }

      function updateGrid() {
        const filteredItems = data.games.filter(item => {
          const matchesSearch = item.title.toLowerCase().includes(state.searchQuery.toLowerCase()) ||
                               item.category.toLowerCase().includes(state.searchQuery.toLowerCase());
          const matchesCategory = state.selectedCategory === 'All' || item.category === state.selectedCategory;
          return matchesSearch && matchesCategory;
        });
        
        const grid = document.querySelector('.grid');
        if (grid) {
          grid.innerHTML = filteredItems.map(item => `
            <div
              onclick="selectItem('${item.id}')"
              class="item-card group glass-card rounded-2xl overflow-hidden cursor-pointer transition-all"

                <p class="text-zinc-500 text-[11px] line-clamp-1">
                  ${item.description}
                </p>
              </div>

          `).join('');

        }
